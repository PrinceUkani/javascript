<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai with prince </title>
</head>
<body style="background-color: #212121; color: #fff; font-family: Arial, sans-serif;">
    <ul class="language">
        <li>java</li>
    </ul>
</body>
<script>
    function addlang(langname) {
        const li = document.createElement('li');
        li.textContent = langname;
        document.querySelector('.language').appendChild(li);
    }
    addlang('new language 1 ');

    function addlangopti(langname){
        const li = document.createElement('li');
        const f = document.createTextNode(langname);
        li.appendChild(f);
        document.querySelector('.language').appendChild(li);

    }
    addlangopti('new language 2');

    //Edit the list

    const secondlang  = document.querySelector("li:nth-child(2)") ;
    secondlang.textContent = "javascript";

    //Edit
    const firstlang = document.querySelector("li:first-child");
    firstlang.outerHTML = "<li>java</li>";

    //remove

    const lastlang = document.querySelector("li:last-child");
    lastlang.remove();

</script>
</html>
